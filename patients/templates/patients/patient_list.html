<!DOCTYPE html>
<html>
  <head>
    <title>HeartSync Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="text-center mb-4">❤️ HeartSync Dashboard</h1>

      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card shadow border-0">
            <div class="card-body text-center">
              <h5>Total Patients</h5>

              <h2 class="text-primary">{{ total_patients }}</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">Register Patient</div>

        <div class="card-body">
          <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label>Name</label>
              <input type="text" name="name" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Age</label>
              <input type="number" name="age" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Gender</label>
              <input type="text" name="gender" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Phone</label>
              <input type="text" name="phone" class="form-control" />
            </div>

            <button class="btn btn-success">Save Patient</button>
          </form>
        </div>
      </div>

      <div class="card shadow">
        <div class="card-header bg-dark text-white">Registered Patients</div>

        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Phone</th>
              </tr>
            </thead>

            <tbody>
              {% for patient in patients %}

              <tr>
                <td>{{ patient.name }}</td>
                <td>{{ patient.age }}</td>
                <td>{{ patient.gender }}</td>
                <td>{{ patient.phone }}</td>
              </tr>

              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
