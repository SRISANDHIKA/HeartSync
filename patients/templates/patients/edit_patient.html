<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        ❤️ Edit Patient
    </h1>

    <div class="card shadow p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       name="name"
                       value="{{ patient.name }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number"
                       name="age"
                       value="{{ patient.age }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Gender</label>
                <input type="text"
                       name="gender"
                       value="{{ patient.gender }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text"
                       name="phone"
                       value="{{ patient.phone }}"
                       class="form-control">
            </div>

            <button type="submit"
                    class="btn btn-success">
                Update Patient
            </button>

            <a href="{% url 'patient_list' %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

</body>
</html>
